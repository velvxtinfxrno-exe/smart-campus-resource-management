# ─────────────────────────────────────────────────────────────
# Production profile — used when deployed on Render
# Place this file at:  src/main/resources/application-prod.properties
# ─────────────────────────────────────────────────────────────

# Render injects the PORT environment variable automatically
server.port=${PORT:8080}

# Allow your Vercel frontend URL (set FRONTEND_URL in Render dashboard)
# e.g.  FRONTEND_URL = https://campus-ui-xyz.vercel.app
cors.allowed.origin=${FRONTEND_URL:http://localhost:5173}
